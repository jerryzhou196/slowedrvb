  <style>
    :root {
      /* monkeytype "serika dark" / slowedrvb palette */
      --bg: #323437;
      --main: #e2b714;
      --sub: #646669;
      --sub-alt: #2c2e31;
      --text: #d1d0c5;
      --error: #ca4754;
      --pink: #ff007a;
      --inner: #262626;
      --rotation-duration: 1s;
      --vinyl-clearance: 90px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    [hidden] { display: none !important; }

    /* react-fade-in style: direct children fade in, staggered 25ms */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .vinyl-col > *, .controls-col > * { opacity: 0; animation: fadeIn 0.2s ease forwards; }
    .vinyl-col > *:nth-child(1), .controls-col > *:nth-child(1) { animation-delay: 0.025s; }
    .vinyl-col > *:nth-child(2), .controls-col > *:nth-child(2) { animation-delay: 0.05s; }
    .vinyl-col > *:nth-child(3), .controls-col > *:nth-child(3) { animation-delay: 0.075s; }
    .vinyl-col > *:nth-child(4), .controls-col > *:nth-child(4) { animation-delay: 0.10s; }
    .vinyl-col > *:nth-child(5), .controls-col > *:nth-child(5) { animation-delay: 0.125s; }
    .vinyl-col > *:nth-child(6), .controls-col > *:nth-child(6) { animation-delay: 0.15s; }
    .vinyl-col > *:nth-child(7), .controls-col > *:nth-child(7) { animation-delay: 0.175s; }
    .vinyl-col > *:nth-child(8), .controls-col > *:nth-child(8) { animation-delay: 0.20s; }
    .vinyl-col > *:nth-child(9), .controls-col > *:nth-child(9) { animation-delay: 0.225s; }
    .vinyl-col > *:nth-child(10), .controls-col > *:nth-child(10) { animation-delay: 0.25s; }
    @media (prefers-reduced-motion: reduce) {
      .vinyl-col > *, .controls-col > * { opacity: 1; animation: none; }
    }

    body {
      font-family: 'Roboto Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-variant-ligatures: none;
    }

    .card {
      width: 100%;
      max-width: 1080px;
    }

    /* two columns: vinyl left (50%), controls right (50%), matched heights */
    .layout {
      display: flex;
      gap: 32px;
      align-items: stretch;
    }

    .vinyl-col {
      flex: 1 1 50%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .controls-col {
      flex: 1 1 50%;
      min-width: 0;
    }

    @media (max-width: 760px) {
      .layout { flex-direction: column; gap: 24px; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--main);
      letter-spacing: -0.01em;
    }

    h1::before {
      content: '> ';
      color: var(--sub);
    }

    .subtitle {
      font-size: 0.8125rem;
      color: var(--sub);
      margin: 6px 0 24px;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    button {
      flex: 1;
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--sub);
      background: var(--sub-alt);
      cursor: pointer;
      transition: color 0.12s, background 0.12s, transform 0.1s, filter 0.12s;
    }

    button:hover {
      background: var(--text);
      color: var(--bg);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* slowedrvb-style filled buttons */
    .btn-stream { background: var(--pink); color: var(--text); }
    .btn-stream:hover { background: var(--pink); color: var(--text); filter: brightness(1.12); }
    .btn-choose { background: var(--main); color: var(--bg); }
    .btn-choose:hover { background: var(--main); color: var(--bg); filter: brightness(1.12); }
    .btn-export { background: var(--sub-alt); color: var(--text); }

    .mobile-youtube-panel {
      display: block;
    }

    .youtube-status-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;

    .mobile-youtube-panel .status {

      min-width: 0;
      margin-top: 0;
      margin-bottom: 0;
      text-align: left;
    }

    .mobile-youtube-panel .youtube-cancel-btn {
      flex: 0 0 10%;
      min-width: 44px;
      margin-top: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--error);
      font-size: 0.75rem;
      line-height: 1;
    }

    .mobile-youtube-panel .youtube-cancel-btn:hover {
      background: transparent;
      color: var(--text);
    }

    .youtube-url-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .mobile-field {
      flex: 1 1 auto;
      width: auto;
      min-width: 0;
      border: 4px solid rgba(255, 0, 122, 0.6);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--text);
      background: var(--sub-alt);
      outline: none;
    }

    .mobile-field:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 0, 122, 0.18);
    }

    .mobile-field[readonly] {
      color: var(--sub);
      cursor: progress;
    }

    .mobile-field::placeholder {
      color: var(--sub);
    }

    .mobile-youtube-panel button,
    .mobile-youtube-panel .mobile-file-button {
      display: block;
      width: 100%;
      margin-top: 10px;
      border-radius: 6px;
      padding: 11px 14px;
      background: var(--main);
      color: var(--bg);
      border: none;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: normal;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    #btn-yt-paste {
      flex: 0 0 10%;
      min-width: 44px;
      margin-top: 0;
      padding-left: 0;
      padding-right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sub-alt);
      color: var(--sub);
    }
    #btn-yt-paste:hover { background: var(--sub-alt); color: var(--text); }

    #btn-clear-songs { background: var(--sub-alt); color: var(--sub); }
    #btn-clear-songs:hover { background: var(--sub-alt); color: var(--error); }
    #btn-youtube-download { display: none; }

    .mobile-btn-row {
      display: none;   /* saved-songs / choose-mp3 are mobile-only; desktop has its own controls */
      gap: 10px;
    }

    .mobile-youtube-panel .mobile-options-toggle {
      display: none;
      width: auto;
      margin: 10px auto 0;
      padding: 7px 10px;
      border-radius: 6px;
      background: transparent;
      color: var(--sub);
      font-size: 0.6875rem;
      font-weight: 600;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .mobile-youtube-panel .mobile-options-toggle:hover {
      background: var(--sub-alt);
      color: var(--text);
    }

    .mobile-btn-row button,
    .mobile-btn-row .mobile-file-button {
      flex: 1;
      min-width: 0;
    }

    .file-input-native {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
    }

    /* pink, matching the stream button */
    #btn-saved-songs { background: var(--pink); color: var(--text); }
    #btn-saved-songs:hover { background: var(--pink); color: var(--text); filter: brightness(1.12); }

    .saved-songs-list {
      list-style: none;
      margin: 10px 0 0;
      padding: 0;
      max-height: 220px;
      overflow-y: auto;
    }

    .saved-songs-list li {
      margin-top: 8px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--sub-alt);
      color: var(--text);
      font-size: 0.8125rem;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .saved-songs-list li:hover { color: var(--main); }

    .saved-songs-list li.empty {
      color: var(--sub);
      cursor: default;
      text-align: center;
    }

    .advanced-toggle {
      width: 100%;
      margin-top: 12px;
      background: transparent;
      color: var(--sub);
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 9px;
    }
    .advanced-toggle:hover { background: var(--sub-alt); color: var(--text); }

    .preset-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin-top: 12px;
      margin-bottom: 16px;
    }

    .preset-btn {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      background: var(--sub-alt);
      color: var(--sub);
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .preset-btn:hover { background: var(--sub-alt); color: var(--sub); filter: brightness(1.3); }

    .preset-btn.active,
    .preset-btn.active:hover {
      background: var(--main);
      color: var(--bg);
      filter: none;
    }

    .preset-btn-compact {
      flex: 0 0 20%;
      padding-left: 0;
      padding-right: 0;
      white-space: nowrap;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-row .label {
      font-size: 0.75rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .toggle-row .label small {
      display: block;
      margin-top: 3px;
      font-size: 0.625rem;
      color: var(--sub);
      text-transform: none;
      letter-spacing: 0;
    }

    button.toggle {
      flex: 0 0 60px;
      padding: 8px 0;
    }

    button.toggle.active,
    button.toggle.active:hover {
      background: var(--main);
      color: var(--bg);
    }

    /* ---- vinyl player (design from slowedrvb.com), 25% larger ---- */
    .vinyl-player {
      position: relative;
      width: min(525px, calc(100% - var(--vinyl-clearance)));
      aspect-ratio: 1 / 1;
      margin: 0 var(--vinyl-clearance) 0 auto;   /* clear the overhanging tonearm from the controls */
    }

    .disc {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      /* conic sheen over a solid label keeps the spin visible without groove lines */
      background:
        conic-gradient(from 0deg,
          rgba(0, 0, 0, 0.12), rgba(255, 255, 255, 0.06),
          rgba(0, 0, 0, 0.12), rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.12)),
        var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
    }

    .disc.spinning {
      animation: spin var(--rotation-duration) linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .disc.dragover { outline: 3px dashed var(--pink); outline-offset: 10px; }

    .inner-disc {
      width: 34%;
      height: 34%;
      border-radius: 50%;
      background: var(--inner);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 3px rgba(0, 0, 0, 0.25);
    }

    /* song name printed on the label — rides along as the disc spins */
    .disc-label {
      max-width: 84%;
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .stick {
      position: absolute;
      top: -20%;
      left: 54%;
      width: 78%;
      z-index: 10;
      transform-origin: center;
      pointer-events: none;
    }

    /* the tonearm only swings while the record is playing */
    .disc.spinning ~ .stick {
      animation: swing 2s ease-in-out infinite;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-20deg); }
      50% { transform: rotate(10deg); }
    }

    /* player bar: play/pause + waveform scrubber, under the vinyl, both modes */
    .player {
      display: flex;
      align-items: center;
      gap: 14px;
      width: calc(100% - var(--vinyl-clearance));
      margin-top: 32px;
      margin-left: auto;
      margin-right: var(--vinyl-clearance);   /* keep the waveform aligned under the shifted disc */
    }

    .play-btn {
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--main);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .play-btn:hover { background: var(--main); color: var(--bg); filter: brightness(1.1); }
    .play-btn:disabled { filter: none; }
    .play-btn svg { width: 52%; height: 52%; fill: var(--bg); }

    .play-col {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .wave-wrap {
      flex: 1;
      min-width: 0;
      border: 2px solid var(--sub);
      border-radius: 10px;
      padding: 7px;
      background: var(--sub-alt);
    }

    .player canvas {
      display: block;
      width: 100%;
      height: 84px;
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
    }

    .volume-strip {
      display: flex;
      align-items: center;
      width: 54px;
      height: 18px;
    }

    .volume-strip input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        var(--main) 0%,
        var(--main) var(--volume-progress, 100%),
        var(--bg) var(--volume-progress, 100%),
        var(--bg) 100%
      );
    }

    .volume-strip input[type="range"]::-webkit-slider-thumb {
      width: 12px;
      height: 12px;
    }

    .volume-strip input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
    }

    @media (max-width: 760px) {
      .vinyl-player {
        width: min(100%, 525px);
        margin: 0 auto;
      }

      .player {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }
    }

    .slider-section.disabled { opacity: 0.4; }
    .slider-section.disabled input[type="range"] { pointer-events: none; }

    .slider-section {
      background: var(--sub-alt);
      border-radius: 10px;

    .slider-label {
      display: flex;

      align-items: baseline;

    .slider-label > span {
      font-size: 0.75rem;

    .slider-label .rate-value {

    input[type="range"] {
      -webkit-appearance: none;

    .ticks span { font-size: 0.6875rem; color: var(--sub); }

    .eightd-speed {

    .status {

    .jump-live-btn {

      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      html.mobile-scroll-open,
      html.mobile-scroll-open body {
        height: auto;
        overflow-y: auto;
        overscroll-behavior-y: auto;
      }

      body {
        align-items: flex-start;
        max-height: 100svh;
        min-height: 100svh;
        padding: 16px;
      }

      html.mobile-scroll-open body {
        max-height: none;
        -webkit-overflow-scrolling: touch;
      }

      .card {
        max-width: 440px;
        margin: 0 auto;
      }

      html:not(.mobile-scroll-open) .card {
        height: calc(100svh - 32px);
        overflow: hidden;
      }

      .layout {
        display: block;
      }

      .vinyl-player,
      .player,
      .controls-col > h1,
      .subtitle,
      .controls {
        display: none;
      }

      /* keep .vinyl-col lightweight on mobile after hiding the desktop player */
      .vinyl-col {
        display: block;
      }

      .controls-col {
        width: 100%;
      }

      .vinyl-col > *,
      .controls-col > * {
        opacity: 1;
        animation: none;
      }

      .mobile-youtube-panel .mobile-options-toggle {
        display: block;
      }

      #btn-youtube-download {
        display: block;
      }

      .mobile-btn-row:not([hidden]) {
        display: flex;
      }

      .slider-section {
        margin-top: 14px;
        padding: 18px 16px;
      }

      .slider-label {
        margin-bottom: 16px;
      }

      input[type="range"] {
        height: 8px;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="layout">
      <div class="vinyl-col">
        <div class="vinyl-player">
          <div class="disc" id="disc">
            <div class="inner-disc"><span class="disc-label" id="track-name"></span></div>
          </div>
          <img class="stick" src="stick.svg" alt="">
        </div>
        <div class="player">
          <div class="play-col">
            <button class="play-btn" id="btn-play" onclick="toggle_play()" aria-label="play / pause" disabled></button>
            <div class="volume-strip">
              <input id="volume-control" type="range" min="0" max="100" value="100" step="1" aria-label="volume">
            </div>
          </div>
          <div class="wave-wrap"><canvas id="buffer-canvas" width="480" height="96"></canvas></div>
        </div>
        <button class="jump-live-btn" id="btn-jump-live" onclick="refresh_stream()" aria-label="jump to live stream" hidden>jump to live</button>
      </div>

      <div class="controls-col">
        <div class="mobile-youtube-panel" id="mobile-youtube-panel">
          <div class="youtube-status-row">
            <div class="status" id="status">paste a youtube URL.</div>
            <button class="youtube-cancel-btn" id="btn-youtube-cancel" onclick="cancel_youtube_download()" hidden>cancel</button>
          </div>
          <div class="youtube-url-row">
            <input class="mobile-field" id="youtube-url-input" type="url" inputmode="url" autocomplete="url" placeholder="youtube url" aria-label="youtube url">
            <button id="btn-yt-paste" onclick="paste_and_download()" title="paste link &amp; download" aria-label="paste link and download">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="8" y="2" width="8" height="4" rx="1"></rect>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              </svg>
            </button>
          </div>
          <button id="btn-youtube-download" onclick="download_youtube()">play</button>
          <button class="mobile-options-toggle" id="btn-mobile-more-options" onclick="toggle_mobile_more_options()" aria-expanded="false" aria-controls="mobile-more-options">more options &#9662;</button>
          <div class="mobile-btn-row" id="mobile-more-options" hidden>
            <button id="btn-saved-songs" onclick="toggle_saved_songs()">saved songs</button>
            <label class="mobile-file-button" id="btn-choose-mp3" for="file-input" role="button" tabindex="0">choose mp3</label>
          </div>
          <ul class="saved-songs-list" id="saved-songs-list" aria-label="saved songs" hidden></ul>
          <button id="btn-clear-songs" onclick="clear_saved_songs()" hidden>clear saved songs</button>
        </div>

        <div class="slider-section slider-rate">
          <div class="slider-label">
            <span>playback rate</span>
            <span class="rate-value"><span id="playback-rate-value">1.00</span><span class="rate-suffix">&times;</span></span>
          </div>
          <input type="range" id="playback-rate-control" min="0" max="1.5" step="any" value="1">
          <div class="ticks" id="rate-ticks">
            <span>0&times;</span>
            <span>0.75&times;</span>
            <span>1.5&times;</span>
          </div>
        </div>

        <div class="slider-section slider-reverb">
          <div class="slider-label">
            <span>reverb mix</span>
            <span class="rate-value"><span id="reverb-mix-value">0</span><span class="rate-suffix">%</span></span>
          </div>
          <input type="range" id="reverb-mix-control" min="0" max="100" step="any" value="0">
          <div class="ticks">
            <span>dry</span>
            <span>50%</span>
            <span>wet</span>
          </div>
        </div>

        <div class="slider-section slider-bass">
          <div class="slider-label">
            <span>bass boost</span>
            <span class="rate-value">+<span id="bass-boost-value">0.0</span><span class="rate-suffix">dB</span></span>
          </div>
          <input type="range" id="bass-boost-control" min="0" max="15" step="any" value="0">
          <div class="ticks">
            <span>flat</span>
            <span>+7.5dB</span>
            <span>+15dB</span>
          </div>
        </div>

        <div class="preset-row">
          <button class="preset-btn" id="btn-dj-screw" onclick="dj_screw_preset()">screw and chop</button>
          <button class="preset-btn preset-btn-compact" id="btn-8d-fast" onclick="eightd_fast_preset()" aria-pressed="false">8D off</button>
        </div>

        <button class="advanced-toggle" id="btn-advanced" onclick="toggle_advanced()" aria-expanded="false">show advanced &#9662;</button>

        <div id="advanced" hidden>
          <div class="controls" id="file-controls">
            <button class="btn-stream" id="btn-stream" onclick="stream_tab()">stream (tab)</button>
            <button class="btn-choose" id="btn-choose" onclick="choose_file()">choose mp3 file</button>
            <button class="btn-export" id="btn-export" onclick="export_mp3()" hidden>export mp3</button>
          </div>

          <div class="slider-section">
            <div class="slider-label">
              <span>reverb decay</span>
              <span class="rate-value"><span id="reverb-decay-value">3.0</span><span class="rate-suffix">s</span></span>
            </div>
            <input type="range" id="reverb-decay-control" min="0.5" max="8" step="any" value="3.0">
            <div class="ticks">
              <span>0.5s</span>
              <span>4s</span>
              <span>8s</span>
            </div>
          </div>

          <div class="slider-section">
            <div class="toggle-row">
              <span class="label">8d audio<small>auto-sweep left &harr; right</small></span>
              <button class="toggle" id="btn-8d" onclick="toggle_8d()" aria-pressed="false">off</button>
            </div>
            <div class="eightd-speed" id="eightd-speed" hidden>
              <div class="slider-label">
                <span>orbit speed</span>
                <span class="rate-value"><span id="eightd-period-value">8.0</span><span class="rate-suffix">s</span></span>
              </div>
              <input type="range" id="eightd-period-control" min="2" max="20" step="any" value="8">
              <div class="ticks">
                <span>2s fast</span>
                <span>8s</span>
                <span>20s slow</span>
              </div>
            </div>
          </div>

          <div class="slider-section" id="pan-section">
            <div class="slider-label">
              <span>3d pan</span>
              <span class="rate-value"><span id="pan-value">C</span></span>
            </div>
            <input type="range" id="pan-control" min="-100" max="100" step="any" value="0">
            <div class="ticks">
              <span>left</span>
              <span>center</span>
              <span>right</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <input class="file-input-native" type="file" id="file-input" accept="audio/*">
  <script src="index.js"></script>
</body>
</html>
